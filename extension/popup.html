<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickProof</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
    }

    /* 헤더 */
    .header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }
    .header .logo {
      width: 22px;
      height: 22px;
    }
    .protection-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #94a3b8;
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #475569;
      border-radius: 10px;
      transition: 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #22c55e;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* 현재 URL */
    .current-url {
      padding: 10px 16px;
      font-size: 11px;
      color: #64748b;
      word-break: break-all;
      max-height: 36px;
      overflow: hidden;
      border-bottom: 1px solid #1e293b;
    }

    /* 점수 */
    .score-section {
      padding: 20px 16px;
      text-align: center;
    }
    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .score-circle.safe { background: rgba(34,197,94,0.15); color: #22c55e; border: 3px solid #22c55e; }
    .score-circle.warning { background: rgba(234,179,8,0.15); color: #eab308; border: 3px solid #eab308; }
    .score-circle.danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 3px solid #ef4444; }

    .score-label {
      font-size: 13px;
      font-weight: 600;
    }
    .score-label.safe { color: #22c55e; }
    .score-label.warning { color: #eab308; }
    .score-label.danger { color: #ef4444; }

    /* 결과 리스트 */
    .results {
      padding: 0 16px 12px;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 5px;
    }
    .result-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .result-icon.pass { color: #22c55e; }
    .result-icon.fail { color: #ef4444; }
    .result-name {
      font-weight: 600;
      font-size: 11px;
      color: #cbd5e1;
      min-width: 80px;
      flex-shrink: 0;
    }
    .result-detail {
      font-size: 11px;
      color: #94a3b8;
      flex: 1;
    }

    /* 수동 검사 입력 */
    .manual-section {
      padding: 12px 16px;
      border-top: 1px solid #1e293b;
    }
    .manual-section label {
      display: block;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .manual-input-row {
      display: flex;
      gap: 6px;
    }
    .manual-input-row input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #e2e8f0;
      outline: none;
    }
    .manual-input-row input:focus {
      border-color: #3b82f6;
    }
    .manual-input-row input::placeholder {
      color: #475569;
    }
    .manual-input-row button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .manual-input-row button:hover {
      background: #2563eb;
    }

    /* 상태 */
    .loading {
      padding: 40px;
      text-align: center;
      color: #64748b;
    }
    .error {
      padding: 20px;
      text-align: center;
      color: #ef4444;
      font-size: 12px;
    }

    /* 푸터 */
    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: #334155;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img class="logo" src="icons/icon-48.png" alt="ClickProof">
      <h1>ClickProof</h1>
    </div>
    <div class="protection-toggle">
      <span>자동 보호</span>
      <label class="toggle-switch">
        <input type="checkbox" id="protectionToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="current-url" id="currentUrl">분석 중...</div>

  <div id="content">
    <div class="loading" id="loading">URL을 분석하고 있습니다...</div>
  </div>

  <div class="manual-section">
    <label>URL 직접 검사</label>
    <div class="manual-input-row">
      <input type="text" id="manualUrl" placeholder="https://example.com">
      <button id="manualCheck">검사</button>
    </div>
  </div>

  <div class="footer">ClickProof — 모든 분석은 기기에서 로컬로 수행됩니다</div>

  <script src="lib/korean-domains.js"></script>
  <script src="lib/url-analyzer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
